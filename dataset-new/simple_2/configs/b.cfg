hostname b
interface Loopback0
  ip address 70.0.1.0/32
!
interface Serial0
  ip address 10.0.0.0/31
!
interface Serial1
  ip address 10.0.1.0/31
!
interface Serial2
  ip address 10.0.2.0/31
!
route-map RMap_b_from_a deny 10
 set local-preference 200

router bgp 11
  neighbor 10.0.0.1 remote-as 10
  neighbor 10.0.0.1 route-map RMap_b_from_a in
!