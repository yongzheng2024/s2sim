!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Bratislava
!
!
interface Fa1/0
 ip address 10.0.0.0 255.255.255.254
 description "To Vienna"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.2 255.255.255.254
 description "To Praha"
 speed auto
 duplex auto
!
interface Fa0/0
 ip address 10.0.0.4 255.255.255.254
 description "To Budapest"
 speed auto
 duplex auto
!
!
!
ip as-path access-list 10 permit _230_
!
!
!
route-map RMap_Bratislava_from_Praha deny 10
 match as-path 10
 set local-preference 1
 set community 100:0 additive
route-map RMap_Bratislava_from_Praha permit 100
!
!
interface Loopback0
 ip address 128.0.4.1 255.255.255.0
 description "For Destination"
!
ip route 128.0.4.0/24 Null0
!
!
router bgp 50
 network 128.0.4.0 mask 255.255.255.0
 no synchronization
#  bgp log-neighbor-changes
 !neighbor 10.0.0.5 remote-as 80
 neighbor 10.0.0.5 description "To Budapest"
 neighbor 10.0.0.5 advertisement-interval 0
 neighbor 10.0.0.5 soft-reconfiguration inbound
 neighbor 10.0.0.5 send-community
 neighbor 10.0.0.3 remote-as 230
 neighbor 10.0.0.3 description "To Praha"
 neighbor 10.0.0.3 advertisement-interval 0
 neighbor 10.0.0.3 soft-reconfiguration inbound
 neighbor 10.0.0.3 send-community
 neighbor 10.0.0.3 route-map RMap_Bratislava_from_Praha in
 neighbor 10.0.0.1 remote-as 300
 neighbor 10.0.0.1 description "To Vienna"
 neighbor 10.0.0.1 advertisement-interval 0
 neighbor 10.0.0.1 soft-reconfiguration inbound
 neighbor 10.0.0.1 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
