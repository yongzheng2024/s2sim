!
version 15.2
!
service timestamps debug datetime msec
!
service timestamps log datetime msec
!
boot-start-marker
!
boot-end-marker
!
no aaa new-model
!
ip cef
!
no ipv6 cef
!
multilink bundle-name authenticated
!
ip forward-protocol nd
!
no ip http server
!
no ip http secure-server
!
ip bgp-community new-format
!
hostname Basel
!
!
interface Fa0/0
 ip address 10.0.0.219 255.255.255.254
 description "To NodeID73"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.223 255.255.255.254
 description "To Zurich"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.1.66 255.255.255.254
 description "To Strasbourg"
 speed auto
 duplex auto
!
!
!
!
!
!
!
!
router bgp 80
 no synchronization
 !bgp log-neighbor-changes
 neighbor 10.0.0.218 remote-as 1010
 neighbor 10.0.0.218 description "To NodeID73"
 neighbor 10.0.0.218 advertisement-interval 0
 neighbor 10.0.0.218 soft-reconfiguration inbound
 neighbor 10.0.0.218 send-community
 neighbor 10.0.1.67 remote-as 1330
 neighbor 10.0.1.67 description "To Strasbourg"
 neighbor 10.0.1.67 advertisement-interval 0
 neighbor 10.0.1.67 soft-reconfiguration inbound
 neighbor 10.0.1.67 send-community
 neighbor 10.0.0.222 remote-as 1530
 neighbor 10.0.0.222 description "To Zurich"
 neighbor 10.0.0.222 advertisement-interval 0
 neighbor 10.0.0.222 soft-reconfiguration inbound
 neighbor 10.0.0.222 send-community
!
!
!
!
!
!
!
!
!
!
!
control-plane
!
!
line con 0
 stopbits 1
line aux 0
 stopbits 1
line vty 0 4
 login
!
end
